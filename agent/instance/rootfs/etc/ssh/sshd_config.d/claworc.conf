# Claworc SSH Server Hardened Configuration
# This configuration is applied via sshd_config.d/ include mechanism

# Network
Port 22
ListenAddress 0.0.0.0

# Authentication
PubkeyAuthentication yes
PasswordAuthentication no
PermitEmptyPasswords no
PermitRootLogin prohibit-password
MaxAuthTries 3
StrictModes yes
LoginGraceTime 30

# Connection limits
MaxStartups 10:30:60

# Forwarding restrictions
X11Forwarding no
AllowAgentForwarding no
AllowTcpForwarding yes
PermitOpen localhost:3000 localhost:18789 127.0.0.1:3000 127.0.0.1:18789 localhost:9222 127.0.0.1:9222
# 127.0.0.1:9222 is the CDP agent-listener used by the on-demand browser
# bridge: when OpenClaw inside the agent dials localhost:9222, sshd accepts
# the connection (because the control plane has installed a remote port
# forward on it via ssh.Client.Listen) and forwards it back through the SSH
# session to the bridge, which routes it to the browser pod.
# 127.0.0.1:40001 is the LLM proxy listener.
PermitListen 127.0.0.1:9222 127.0.0.1:40001

# Logging
SyslogFacility AUTH
LogLevel INFO
