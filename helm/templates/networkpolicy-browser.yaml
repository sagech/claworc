{{/*
NetworkPolicy for on-demand browser pods. Browser pods are dynamically
created by the control plane (per-instance, on first CDP/VNC use) with
labels claworc-role=browser. They expose only sshd (port 22); the control
plane SSHes in and uses ssh.Client.Dial to reach the loopback-bound CDP
(127.0.0.1:9222) and noVNC (127.0.0.1:3000) services inside the pod.
Sibling agent pods, sibling browser pods, and any other workload in the
namespace are denied.
*/}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: bot-browser-isolation
  namespace: {{ .Values.config.k8sNamespace }}
spec:
  podSelector:
    matchLabels:
      claworc-role: browser
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "claworc.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 22
